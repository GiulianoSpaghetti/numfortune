name: .NET MAUI Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Release]
    env:
      Solution_Name: numfortune
      Configuration: ${{ matrix.configuration }}
      Architecture: win-x64
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 11.0.x
        dotnet-quality: 'preview'
        
    - name: Import PFX certificate
      run: |
        $pfx_password = ConvertTo-SecureString "${{ secrets.PFX_KEY }}" -AsPlainText -Force
        $pfxBytes = [System.Convert]::FromBase64String("${{ secrets.BASE64_ENCODED_PFX }}")
        $pfxPath = Join-Path $env:RUNNER_TEMP "signing.pfx"
        [System.IO.File]::WriteAllBytes($pfxPath, $pfxBytes)
        Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $pfx_Password
        Write-Host "Certificate safely imported to store."
      shell: pwsh

    - name: Install MAUI Workload
      run: dotnet workload install maui

    - name: Set SOLUTION
      run: set-env name=SOLUTION::${{ env.Solution_Name }}.slnx

    - name: Restore packages
      run: dotnet restore $SOLUTION -r $env:Architecture

    - name: Set MYPATH
      run: set-env name=MYPATH::${{ env.Solution_Name }}/${{ env.Solution_Name }}.csproj

    - name: Build MAUI MSIX
      run: |
        dotnet publish $MYPATH -f net11.0-windows10.0.26100.0 -c $env:Configuration -r $env:Architecture
      shell: pwsh

    - name: Upload MSIX artifact
      uses: actions/upload-artifact@v7
      with:
        name: MSIX
        path: $env:Solution_Name/AppPackages/
        include-hidden-files: true
        if-no-files-found: error
